# S.E.I.Z.E. DHCP Server Configuration (dnsmasq)
# Configures DHCP for the usb0 (USB Ethernet Gadget) interface to auto-connect the target computer.

# Listen on this interface only
interface=usb0
bind-interfaces

# DHCP range: allocate from 192.168.7.2 to 192.168.7.10
dhcp-range=192.168.7.2,192.168.7.10,255.255.255.0,12h

# Gateway option: Point to the Pi (192.168.7.1)
dhcp-option=3,192.168.7.1

# DNS server option: Point to the Pi (speeds up DNS resolving for local traffic)
dhcp-option=6,192.168.7.1

# Force dnsmasq to log queries and leases for auditing
log-queries
log-dhcp
