# S.E.I.Z.E. Static IP Configuration for usb0
# Depending on your Raspberry Pi OS version, choose Option A (Newer OS) or Option B (Older OS).

# ==========================================
# OPTION A: For Raspberry Pi OS Bookworm & Newer (Uses NetworkManager)
# File path on Pi: /etc/NetworkManager/system-connections/usb0.nmconnection
# File permissions must be set to 600 (chmod 600)
# ==========================================
# [connection]
# id=usb0
# uuid=3a1b2c3d-4e5f-6a7b-8c9d-0e1f2a3b4c5d
# type=ethernet
# interface-name=usb0
# permissions=
# 
# [ethernet]
# mac-address-blacklist=
# 
# [ipv4]
# address1=192.168.7.1/24
# method=manual
# 
# [ipv6]
# addr-gen-mode=default
# method=ignore


# ==========================================
# OPTION B: For Raspberry Pi OS Bullseye & Older (Uses dhcpcd)
# File path on Pi: Add the following lines to the end of /etc/dhcpcd.conf
# ==========================================
# interface usb0
# static ip_address=192.168.7.1/24
# nogateway
# nohook wpa_supplicant
